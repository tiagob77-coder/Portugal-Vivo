name: Seed Events 2026

# Manual trigger — syncs curated + Excel + dados.gov.pt events
# into the `events` collection on MongoDB Atlas.
on:
  workflow_dispatch:
    inputs:
      min_expected:
        description: 'Minimum event count expected after sync (fail job otherwise)'
        required: false
        default: '200'

concurrency:
  group: seed-events
  cancel-in-progress: false

jobs:
  seed:
    name: Seed events into MongoDB Atlas
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      MONGO_URL: ${{ secrets.MONGO_URL }}
      DB_NAME:   ${{ secrets.DB_NAME || 'portugal_vivo' }}
      MIN_EXPECTED: ${{ inputs.min_expected }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        uses: actions/checkout@v5

      - name: Verify MONGO_URL secret is set
        run: |
          RAW_LEN=$(echo -n "${MONGO_URL}" | wc -c)
          CLEAN_LEN=$(printf '%s' "${MONGO_URL}" | tr -d '[:space:]' | wc -c)
          echo "MONGO_URL raw length:   ${RAW_LEN} chars"
          echo "MONGO_URL clean length: ${CLEAN_LEN} chars"
          if [ -z "${MONGO_URL}" ]; then
            echo "::error::MONGO_URL secret is not configured."
            exit 1
          fi
          if [ "${RAW_LEN}" != "${CLEAN_LEN}" ]; then
            DIFF=$((RAW_LEN - CLEAN_LEN))
            echo "::warning::Secret contains ${DIFF} whitespace char(s); seed script will strip them."
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install 'motor>=3.3' 'pymongo[srv]>=4.6' dnspython httpx

      # Normalise MONGO_URL in-place: strip whitespace + RFC 3986-encode
      # credentials. This runs BEFORE the script so even an old checkout
      # of seed_events_2026.py receives a valid URI.
      - name: Normalise MONGO_URL (RFC 3986)
        run: |
          ENCODED=$(python3 - <<'PY'
          import os, urllib.parse as up, sys
          raw = "".join(os.environ.get("MONGO_URL", "").split())
          if not raw:
              sys.exit("MONGO_URL is empty")
          p = up.urlparse(raw)
          if p.username is not None:
              user = up.quote_plus(p.username)
              pwd  = up.quote_plus(p.password or "")
              host = p.hostname or ""
              if p.port:
                  host = f"{host}:{p.port}"
              raw = up.urlunparse(p._replace(netloc=f"{user}:{pwd}@{host}"))
          print(raw, end="")
          PY
          )
          echo "MONGO_URL=$ENCODED" >> "$GITHUB_ENV"

      # Safe diagnostics: show user+host+params (password redacted) so we
      # can confirm the secret points to the right cluster/username.
      - name: Parse MONGO_URL (redacted)
        run: |
          python - <<'PY'
          import os, urllib.parse as up
          raw = os.environ.get("MONGO_URL", "")
          clean = "".join(raw.split())
          if not clean:
              raise SystemExit("MONGO_URL is empty")
          p = up.urlparse(clean)
          user = p.username or "(none)"
          host = p.hostname or "(none)"
          port = p.port
          scheme = p.scheme
          query = p.query
          db_path = p.path.lstrip("/") or "(none)"
          # Length of the password component only — no value shown
          pwd_len = len(p.password or "")
          print(f"  scheme:   {scheme}")
          print(f"  user:     {user!r}")
          print(f"  pwd len:  {pwd_len} chars (value redacted)")
          print(f"  host:     {host}")
          if port:
              print(f"  port:     {port}")
          print(f"  db_path:  {db_path}")
          print(f"  query:    {query}")
          # Sanity flags
          if scheme not in ("mongodb", "mongodb+srv"):
              print(f"::warning::Unexpected scheme: {scheme}")
          if pwd_len == 0:
              print("::error::Password is empty in URI")
          if "%" in (p.password or ""):
              print("  note: password contains URL-encoded chars (%)")
          PY

      - name: Seed events
        run: |
          python scripts/seed_events_2026.py

      - name: Verify event count (gate)
        run: |
          python - <<'PY'
          import os
          from pymongo import MongoClient
          url = "".join(os.environ["MONGO_URL"].split())
          db = MongoClient(url, serverSelectionTimeoutMS=15000,
                           w="majority")[os.environ["DB_NAME"].strip()]
          n = db.events.count_documents({})
          min_n = int(os.environ["MIN_EXPECTED"])
          print(f"events in DB: {n} (minimum expected: {min_n})")
          if n < min_n:
              raise SystemExit(f"FAIL: only {n} events in DB, expected ≥ {min_n}")
          print("OK — events collection passes the minimum gate.")
          PY
