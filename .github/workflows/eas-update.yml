name: EAS Update (preview)

# Publica um EAS Update no canal `preview` a cada push em main que toque no
# frontend. Dispositivos com um build do canal `preview` recebem o JS mais
# recente over-the-air, sem rebuild.
#
# Pré-requisitos (uma vez, localmente, com a tua conta Expo):
#   1. cd frontend && npx expo install expo-updates
#   2. eas login && eas init && eas update:configure
#      (escreve updates.url + projectId em frontend/app.json)
#   3. GitHub → Settings → Secrets → EXPO_TOKEN
# Enquanto estes não estiverem feitos, o workflow salta-se a si próprio
# (emite um aviso, mas NÃO falha o CI).

on:
  push:
    branches: [main]
    paths: ["frontend/**"]
  workflow_dispatch:
    inputs:
      branch:
        description: "Canal EAS Update"
        required: true
        type: choice
        default: "preview"
        options: ["preview", "production"]
      message:
        description: "Mensagem do update (opcional)"
        required: false
        type: string

concurrency:
  group: eas-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    name: eas update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Guard — config + secret prontos?
        id: guard
        working-directory: frontend
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "::warning::EXPO_TOKEN em falta (Settings → Secrets). A saltar o EAS Update."
            echo "ready=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if ! node -e "const d=require('./package.json').dependencies||{};process.exit(d['expo-updates']?0:1)"; then
            echo "::warning::expo-updates não instalado — corre 'npx expo install expo-updates' localmente. A saltar."
            echo "ready=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if ! node -e "const u=(require('./app.json').expo.updates||{}).url;process.exit(u?0:1)"; then
            echo "::warning::updates.url ausente no app.json — corre 'eas update:configure' localmente. A saltar."
            echo "ready=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Setup Node 20
        if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup EAS CLI
        if: steps.guard.outputs.ready == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install frontend deps
        if: steps.guard.outputs.ready == 'true'
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Publish EAS Update
        if: steps.guard.outputs.ready == 'true'
        working-directory: frontend
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BRANCH: ${{ github.event.inputs.branch || 'preview' }}
          UPDATE_MSG: ${{ github.event.inputs.message || '' }}
        run: |
          MSG="${UPDATE_MSG:-main @ ${GITHUB_SHA::7}}"
          eas update --branch "$EAS_BRANCH" --message "$MSG" --non-interactive
