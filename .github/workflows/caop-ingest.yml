name: CAOP Ingest

# Manual-only trigger — prevents accidental re-ingestion on push.
# Trigger via GitHub UI: Actions → "CAOP Ingest" → "Run workflow".
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'GitHub Release tag holding CAOP GPKG assets (default: CAOP-2025-DATA)'
        required: false
        default: 'CAOP-2025-DATA'
      wipe:
        description: 'Drop caop_* collections before re-ingesting'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      only_file:
        description: 'Optional single GPKG filename to process (leave empty for all)'
        required: false
        default: ''

concurrency:
  group: caop-ingest
  cancel-in-progress: false   # never cancel a running ingest midway

jobs:
  ingest:
    name: Ingest CAOP into MongoDB Atlas
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      MONGO_URL: ${{ secrets.MONGO_URL }}
      DB_NAME:  ${{ secrets.DB_NAME || 'portugal_vivo' }}
      RELEASE_TAG: ${{ inputs.release_tag }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # ── 1. Checkout the exact branch from which we were triggered ──────────
      - name: Checkout repository
        uses: actions/checkout@v4
        uses: actions/checkout@v5

      # ── 2. Fail fast if the secret is missing ──────────────────────────────
      - name: Verify MONGO_URL secret is set
        run: |
          if [ -z "${MONGO_URL}" ]; then
            echo "::error::MONGO_URL secret is not configured. Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "MONGO_URL secret present ($(echo -n "${MONGO_URL}" | wc -c) chars)."
          echo "DB_NAME=${DB_NAME}"

      # ── 3. Install Python 3.11 (matches backend runtime) ───────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 4. Install the geo + Mongo slice (avoid full requirements.txt —
      #      too heavy and pulls irrelevant LLM deps) ─────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "motor==3.3.1" \
            "pymongo[srv]==4.5.0" \
            "dnspython==2.8.0" \
            "python-dotenv==1.2.1" \
            "shapely>=2.0,<3.0" \
            "pyproj>=3.6,<4.0" \
            "pyogrio>=0.7,<1.0" \
            "fiona>=1.9,<2.0" \
            "geopandas>=0.14,<1.1" \
            "numpy>=2.0,<3.0"

      # ── 5. Download the CAOP assets from the GitHub Release ────────────────
      #      Accepts both `.gpkg` (direct) and `.zip` (will be extracted).
      #      If the exact tag is not found, falls back to the latest release.
      - name: Download CAOP assets from Release
        run: |
          mkdir -p backend/data/caop
          cd backend/data/caop

          echo "=== Available releases in ${GITHUB_REPOSITORY} ==="
          gh release list --repo "${GITHUB_REPOSITORY}" --limit 20 || true
          echo "=================================================="

          TARGET_TAG="${RELEASE_TAG}"
          if ! gh release view "${TARGET_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "::warning::Tag '${TARGET_TAG}' not found. Falling back to latest release."
            TARGET_TAG="$(gh release list --repo "${GITHUB_REPOSITORY}" --limit 1 --json tagName --jq '.[0].tagName')"
            if [ -z "${TARGET_TAG}" ]; then
              echo "::error::No releases found in ${GITHUB_REPOSITORY}."
              exit 1
            fi
            echo "Using latest release tag: ${TARGET_TAG}"
          fi

          echo "Downloading all .gpkg and .zip assets from ${TARGET_TAG}..."
          gh release download "${TARGET_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern '*.gpkg' \
            --pattern '*.zip' \
            --clobber

          echo "--- downloaded files ---"
          ls -lah

          # Extract any zip archive and promote the inner GPKG to this directory
          for z in *.zip; do
            [ -e "$z" ] || continue
            echo "Extracting $z ..."
            unzip -o -j "$z" '*.gpkg' -d .
            rm -f "$z"
          done

          echo "--- final GPKGs ---"
          ls -lah *.gpkg
          echo "Total size:"
          du -sh .

      # ── 6. Sanity check: list the files the ingest script will read ────────
      - name: Preview file list
        run: |
          echo "CAOP files available:"
          ls -lah backend/data/caop/*.gpkg || true

      # ── 7. Run the ingest (with --wipe by default). This connects to Atlas
      #      via the srv URL using the GitHub-runner public egress IP. ───────
      - name: Run CAOP ingest
        working-directory: backend
        run: |
          ARGS=""
          if [ "${{ inputs.wipe }}" = "true" ]; then
            ARGS="$ARGS --wipe"
          fi
          if [ -n "${{ inputs.only_file }}" ]; then
            ARGS="$ARGS --file data/caop/${{ inputs.only_file }}"
          fi
          echo "Running: python3 scripts/ingest_caop.py $ARGS"
          python3 scripts/ingest_caop.py $ARGS

      # ── 8. Post-ingest verification: count documents in each collection ────
      - name: Verify ingested counts
        working-directory: backend
        run: |
          python3 - <<'PY'
          import os
          from pymongo import MongoClient
          mongo_url = "".join(os.environ["MONGO_URL"].split())
          db_name = os.environ["DB_NAME"].strip()
          c = MongoClient(mongo_url, serverSelectionTimeoutMS=20000, w="majority")
          db = c[db_name]
          for coll in ("caop_distritos", "caop_concelhos", "caop_freguesias"):
              n = db[coll].count_documents({})
              print(f"  {coll:20s} {n:>7d} docs")
          c.close()
          PY
