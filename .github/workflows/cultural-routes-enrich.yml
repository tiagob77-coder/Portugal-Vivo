name: Cultural Routes Enrichment

# Runs daily at 04:00 UTC (low-traffic window) and on demand.
# Re-enriches all cultural routes with cross-module data:
#   heritage_items · events · trails → cultural_routes_enriched (TTL 7d)
on:
  schedule:
    - cron: '0 4 * * *'   # daily at 04:00 UTC
  workflow_dispatch:
    inputs:
      min_expected:
        description: 'Minimum enriched routes expected after run (fail otherwise)'
        required: false
        default: '5'

concurrency:
  group: cultural-routes-enrich
  cancel-in-progress: false

jobs:
  enrich:
    name: Enrich cultural routes — cross-module
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      MONGO_URL:    ${{ secrets.MONGO_URL }}
      DB_NAME:      ${{ secrets.DB_NAME || 'portugal_vivo' }}
      MIN_EXPECTED: ${{ inputs.min_expected || '5' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify MONGO_URL secret
        run: |
          if [ -z "${MONGO_URL}" ]; then
            echo "::error::MONGO_URL secret is not configured."
            exit 1
          fi
          CLEAN=$(printf '%s' "${MONGO_URL}" | tr -d '[:space:]' | wc -c)
          echo "MONGO_URL clean length: ${CLEAN} chars"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install 'motor>=3.3' 'pymongo[srv]>=4.6' dnspython

      - name: Enrich cultural routes
        run: python scripts/enrich_cultural_routes.py

      - name: Verify enriched count (gate)
        run: |
          python - <<'PY'
          import os
          from pymongo import MongoClient
          url  = "".join(os.environ["MONGO_URL"].split())
          db   = MongoClient(url, serverSelectionTimeoutMS=15000)[os.environ["DB_NAME"].strip()]
          n    = db["cultural_routes_enriched"].count_documents({})
          min_n = int(os.environ["MIN_EXPECTED"])
          print(f"cultural_routes_enriched: {n} docs (minimum: {min_n})")
          if n < min_n:
              raise SystemExit(f"FAIL: only {n} enriched routes, expected >= {min_n}")
          print("OK — enrichment gate passed.")
          PY
