name: CD — Deploy para Produção

on:
  # Deploy automático só via workflow_dispatch (aprovação explícita)
  # Push para main dispara CI mas NÃO deploy automático
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente de deploy"
        required: true
        default: "production"
        type: choice
        options: [production, staging]
      image_tag:
        description: "Tag da imagem Docker (deixar vazio = latest)"
        required: false
        default: ""

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false   # não cancelar deploys em curso

jobs:
  # ──────────────────────────────────────────────
  # Pré-requisito: CI tem de passar
  # ──────────────────────────────────────────────
  check-ci:
    name: Verificar CI
    uses: ./.github/workflows/ci.yml

  # ──────────────────────────────────────────────
  # Build e push da imagem Docker
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: [check-ci]

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/portugal-vivo-backend
          tags: |
            type=sha,prefix=commit-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.image_tag }},enable=${{ github.event.inputs.image_tag != '' }}

      - name: Build e push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Approval gate — pausa para revisão manual
  # Configurar "Required reviewers" no ambiente "production" em:
  # GitHub → Settings → Environments → production → Protection rules
  # ──────────────────────────────────────────────
  approval-gate:
    name: Aprovação de Deploy
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Deploy aprovado
        run: |
          echo "✅ Deploy aprovado para ${{ github.event.inputs.environment || 'production' }}"
          echo "Imagem: ${{ needs.build-and-push.outputs.image-tag }}"
          echo "Commit: ${{ github.sha }}"

  # ──────────────────────────────────────────────
  # Build do frontend web estático
  # ──────────────────────────────────────────────
  build-frontend:
    name: Build Frontend Web
    runs-on: ubuntu-latest
    needs: [check-ci]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build web estático
        working-directory: frontend
        env:
          EXPO_PUBLIC_BACKEND_URL: https://api.portugalvivo.pt
          EXPO_PUBLIC_ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
          EXPO_PUBLIC_APP_VERSION: ${{ github.sha }}
          EXPO_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_API_KEY }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
        run: npx expo export --platform web

      - name: Upload artefacto web
        uses: actions/upload-artifact@v4
        with:
          name: frontend-web-dist
          path: frontend/dist/
          retention-days: 1

  # ──────────────────────────────────────────────
  # Deploy — VPS via SSH
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    needs: [approval-gate, build-frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artefacto frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-web-dist
          path: frontend-dist/

      - name: Copiar frontend para servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "frontend-dist/"
          target: "/tmp/pv-frontend-dist"
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH || '/opt/portugal-vivo' }}"
            IMAGE_TAG="${{ needs.build-and-push.outputs.image-tag || 'latest' }}"

            echo "=== Deploy iniciado: $(date) ==="
            echo "Commit: ${{ github.sha }}"
            echo "Imagem: $IMAGE_TAG"

            # Guardar tag atual para rollback
            cd "$DEPLOY_PATH"
            PREVIOUS_TAG=$(docker inspect \
              $(docker-compose -f docker-compose.prod.yml ps -q backend) \
              --format '{{index .Config.Image}}' 2>/dev/null || echo "unknown")
            echo "Imagem anterior: $PREVIOUS_TAG" > /tmp/pv-rollback-info

            # Atualizar repositório
            git pull origin ${{ github.ref_name }}

            # Pull da nova imagem backend
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/portugal-vivo-backend:$IMAGE_TAG

            # Atualizar frontend estático
            sudo mkdir -p /var/www/pwa
            sudo rsync -a --delete /tmp/pv-frontend-dist/ /var/www/pwa/
            sudo chown -R www-data:www-data /var/www/pwa/
            rm -rf /tmp/pv-frontend-dist

            # Recriar containers
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Aguardar health check (máx. 90s)
            echo "A aguardar health check..."
            for i in $(seq 1 18); do
              if curl --silent --fail http://localhost:8001/api/health > /dev/null; then
                echo "✅ Health check OK após $((i*5))s"
                break
              fi
              if [ $i -eq 18 ]; then
                echo "❌ Health check falhou — a iniciar rollback..."
                PREV=$(cat /tmp/pv-rollback-info | grep 'Imagem anterior' | cut -d' ' -f3)
                if [ "$PREV" != "unknown" ] && [ -n "$PREV" ]; then
                  docker pull "$PREV"
                  DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} \
                    docker compose -f docker-compose.prod.yml up -d --remove-orphans
                  echo "⚠️ Rollback para $PREV concluído"
                fi
                exit 1
              fi
              sleep 5
            done

            # Limpeza de imagens antigas (manter últimas 3)
            docker image prune -f

            echo "=== Deploy concluído: $(date) ==="

  # ──────────────────────────────────────────────
  # Notificação de resultado
  # ──────────────────────────────────────────────
  notify:
    name: Notificar resultado
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()

    steps:
      - name: Resultado do deploy
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deploy bem-sucedido para ${{ github.event.inputs.environment || 'production' }}"
            echo "Commit: ${{ github.sha }}"
          else
            echo "❌ Deploy falhou — verificar logs acima"
            exit 1
          fi
