name: CD — Deploy para Produção

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente de deploy"
        required: true
        default: "production"
        type: choice
        options: [production, staging]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # não cancelar deploys em curso

jobs:
  # ──────────────────────────────────────────────
  # Pré-requisito: CI tem de passar
  # ──────────────────────────────────────────────
  check-ci:
    name: Verificar CI
    uses: ./.github/workflows/ci.yml

  # ──────────────────────────────────────────────
  # Build e push da imagem Docker
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: [check-ci]

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no Registry
        uses: docker/login-action@v3
        with:
          # Opção A: Docker Hub
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          # Opção B: GitHub Container Registry — descomentar e comentar as linhas acima
          # registry: ghcr.io
          # username: ${{ github.actor }}
          # password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/portugal-vivo-backend
          tags: |
            type=sha,prefix=commit-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=stable,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build e push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Deploy — Emergent.SH / VPS genérico via SSH
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e

            # Navegar para pasta do projeto
            cd ${{ secrets.DEPLOY_PATH || '/opt/portugal-vivo' }}

            # Atualizar repositório
            git pull origin ${{ github.ref_name }}

            # Pull da nova imagem
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/portugal-vivo-backend:latest

            # Recriar containers com zero downtime
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Aguardar health check
            sleep 10
            curl --fail --retry 5 --retry-delay 5 \
              http://localhost:8001/api/health \
              || { echo "Health check falhou!"; exit 1; }

            # Limpeza de imagens antigas
            docker image prune -f

            echo "Deploy concluído: $(date)"

  # ──────────────────────────────────────────────
  # Notificação de resultado
  # ──────────────────────────────────────────────
  notify:
    name: Notificar resultado
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()

    steps:
      - name: Resultado do deploy
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deploy bem-sucedido para ${{ github.event.inputs.environment || 'production' }}"
            echo "Commit: ${{ github.sha }}"
          else
            echo "❌ Deploy falhou — verificar logs acima"
            exit 1
          fi
