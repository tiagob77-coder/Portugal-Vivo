version: "3.9"

# =============================================================================
# Portugal Vivo — Docker Compose PRODUÇÃO
# Uso: docker compose -f docker-compose.prod.yml up -d
# Requer: ficheiro ./backend/.env com todas as chaves preenchidas
# =============================================================================

services:
  mongodb:
    image: mongo:6
    restart: always
    # Em produção NÃO expor a porta 27017 externamente
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db
      - ./ops/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: portugal_vivo
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" --quiet
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: always
    expose:
      - "6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1000
    volumes:
      - redis_data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  backend:
    image: ${DOCKERHUB_USERNAME:-tiagob77}/portugal-vivo-backend:latest
    # Ou usar build local:
    # build:
    #   context: ./backend
    #   target: production
    restart: always
    ports:
      - "127.0.0.1:8001:8001"    # só localhost — nginx faz o proxy público
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URL=mongodb://pv_app:${MONGO_APP_PASSWORD}@mongodb:27017/portugal_vivo?authSource=portugal_vivo
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=production
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:8001/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ─────────────────────────────────────────────
  # Nginx — Reverse proxy + SSL termination
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ops/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # Certbot — Renovação automática SSL (Let's Encrypt)
  # ─────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Renovar a cada 12h (Certbot só renova se faltarem < 30 dias)
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
  certbot_data:
    driver: local
  certbot_www:
    driver: local
