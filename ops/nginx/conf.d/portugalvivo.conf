# =============================================================================
# Portugal Vivo — Nginx Site Config
# Domínios: api.portugalvivo.pt  +  www/app redirect
# =============================================================================

# Upstream backend with keepalive
upstream backend {
    server backend:8001;
    keepalive 32;
}

# Redirecionar HTTP → HTTPS
server {
    listen 80;
    server_name api.portugalvivo.pt portugalvivo.pt www.portugalvivo.pt;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Canonical redirect: www → non-www
server {
    listen 443 ssl http2;
    server_name www.portugalvivo.pt;

    ssl_certificate     /etc/letsencrypt/live/portugalvivo.pt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portugalvivo.pt/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://portugalvivo.pt$request_uri;
}

# API Backend — api.portugalvivo.pt
server {
    listen 443 ssl http2;
    server_name api.portugalvivo.pt;

    ssl_certificate     /etc/letsencrypt/live/api.portugalvivo.pt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.portugalvivo.pt/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none';" always;

    # Proxy para FastAPI
    location / {
        limit_req zone=api burst=50 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        proxy_buffers         8 16k;
        proxy_buffer_size     32k;
    }

    # Health check sem rate limit
    location /api/health {
        proxy_pass http://backend/api/health;
        access_log off;
    }

    # Webhook Stripe — sem rate limit (mas autenticado por assinatura)
    location /api/premium/webhook {
        proxy_pass http://backend/api/premium/webhook;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# Frontend PWA — portugalvivo.pt (non-www only)
server {
    listen 443 ssl http2;
    server_name portugalvivo.pt;

    ssl_certificate     /etc/letsencrypt/live/portugalvivo.pt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portugalvivo.pt/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/pwa;
    index index.html;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.portugalvivo.pt; frame-ancestors 'none';" always;

    # Cache assets estáticos — long cache with immutable
    location ~* \.(js|css|png|jpg|jpeg|webp|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # HTML files — no-cache so SPA updates are picked up
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }
}
